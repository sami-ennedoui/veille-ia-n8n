services:
  n8n:
    image: n8nio/n8n:latest
    container_name: veille-ia-n8n
    ports:
      - "5678:5678"
    environment:
      # Autorise le module Node "fs" dans les noeuds Code (lecture et ecriture de fichiers).
      - NODE_FUNCTION_ALLOW_BUILTIN=fs
      # Le token Hugging Face est fourni par l'environnement de l'hote.
      # Il est utilise pour creer la credential la premiere fois (voir README).
      - HF_TOKEN=${HF_TOKEN}
      - GENERIC_TIMEZONE=Europe/Paris
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      # Donnees n8n (workflows importes, credentials chiffrees).
      - ./n8n-data:/home/node/.n8n
      # Dossier de sortie verifiable depuis l'hote.
      - ./data:/data
      # Workflow exporte, monte en lecture seule pour l'import.
      - ./workflows:/workflows:ro
